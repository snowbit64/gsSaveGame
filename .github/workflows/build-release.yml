name: Build gsSaveGame
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-pc-windows-gnu
            aarch64-linux-android
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mingw-w64 \
            binutils
      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
      - name: Configure Android toolchains
        run: |
          NDK=$ANDROID_NDK_HOME
          mkdir -p .cargo
          echo '[target.aarch64-linux-android]' > .cargo/config.toml
          echo 'linker = "'$NDK'/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"' >> .cargo/config.toml
      - name: Run tests
        run: cargo test --bin gsSaveGame
      - name: Build Windows
        run: cargo build --release --bin gsSaveGame --target x86_64-pc-windows-gnu
      - name: Build Android ARM64
        run: cargo build --release --bin gsSaveGame --target aarch64-linux-android
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsSaveGame-windows
          path: target/x86_64-pc-windows-gnu/release/gsSaveGame.exe
      - name: Upload Android ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsSaveGame-android-arm64
          path: target/aarch64-linux-android/release/gsSaveGame
